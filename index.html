<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium YouTube Videos</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>

<body class="text-white">

<div class="max-w-7xl mx-auto px-5 py-10">

<!-- Header -->
<header class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-10">

<div>
<h1 class="text-4xl md:text-6xl font-black tracking-tight">
🎬 Free YouTube Videos
</h1>

<p class=" mt-2 text-lg">
Watch trending and premium content
</p>
</div>

<!-- Buttons -->
<div class="flex items-center gap-4">

<button onclick="prevPage()" class="nav-btn">
← Previous
</button>

<span id="pageNum" class="text-lg font-bold ">
Page 1
</span>

<button onclick="nextPage()" class="nav-btn">
Next →
</button>

</div>

</header>

<!-- Loading -->
<div id="loading" class="hidden glass-box text-center py-20 text-2xl font-bold">
Loading Videos...
</div>

<!-- Error -->
<div id="error" class="hidden glass-box text-center py-20">
<p class="text-red-400 text-2xl font-bold">
Failed to load videos
</p>

<button id="retry" class="nav-btn mt-5">
Retry
</button>
</div>

<!-- Grid -->
<div id="videos-grid"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 hidden">
</div>

<!-- No Results -->
<div id="no-results" class="hidden glass-box text-center py-20 text-2xl font-bold">
No Videos Found
</div>

</div>

<script src="script.js"></script>
</body>
</html>
