<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Videos UI - Neo Brutalism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container mx-auto p-8 max-w-7xl">
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="text-6xl md:text-8xl font-black uppercase tracking-widest text-white drop-shadow-4xl border-8 border-white p-8 inline-block bg-black/80">
                Free YouTube Videos
            </h1>
        </header>

        <!-- Loading State -->
        <div id="loading" class="flex justify-center items-center h-64 hidden">
            <div class="text-4xl font-black text-white border-8 border-white p-12 bg-black/50 animate-pulse">
                LOADING VIDEOS...
            </div>
        </div>

        <!-- Error State -->
        <div id="error" class="text-center hidden">
            <div class="text-3xl font-bold text-red-400 border-8 border-red-500 p-12 bg-black/80 mx-auto max-w-2xl">
                <p>Failed to load videos. Check connection.</p>
                <button id="retry" class="mt-8 px-12 py-6 text-2xl font-black border-4 border-white bg-red-600 hover:bg-red-700 text-white cursor-pointer">
                    RETRY
                </button>
            </div>
        </div>

        <!-- Videos Grid -->
        <div id="videos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 hidden">
            <!-- Dynamic video cards -->
        </div>

        <!-- No Results -->
        <div id="no-results" class="text-center hidden">
            <div class="text-4xl font-bold text-white/50 border-4 border-white/30 p-12 bg-black/30">
                No videos found.
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
